services:
  api:
    build: .
    image: rag-api
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_QUEUE_INGEST: ${RABBITMQ_QUEUE_INGEST:-ingest}
      RABBITMQ_EXCHANGE_DEAD_LETTER: ${RABBITMQ_EXCHANGE_DEAD_LETTER:-ingest.dead_letter}
      RABBITMQ_QUEUE_INGEST_FAILED: ${RABBITMQ_QUEUE_INGEST_FAILED:-ingest.failed}
      REDIS_HOST: redis
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?Set RABBITMQ_USER in .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:?Set RABBITMQ_VHOST in .env}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  worker:
    build: .
    image: rag-api
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_QUEUE_INGEST: ${RABBITMQ_QUEUE_INGEST:-ingest}
      RABBITMQ_EXCHANGE_DEAD_LETTER: ${RABBITMQ_EXCHANGE_DEAD_LETTER:-ingest.dead_letter}
      RABBITMQ_QUEUE_INGEST_FAILED: ${RABBITMQ_QUEUE_INGEST_FAILED:-ingest.failed}
      REDIS_HOST: redis
    command: ["uv", "run", "python", "-m", "backend.worker"]
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
  streamlit:
    build: .
    image: rag-api
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    command:
      [
        "uv",
        "run",
        "streamlit",
        "run",
        "app/main.py",
        "--server.address",
        "0.0.0.0",
        "--server.port",
        "8501",
      ]
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  rabbitmq_data:
  redis_data:
