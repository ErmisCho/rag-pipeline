[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    integration: marks tests as integration tests that require live infrastructure

# Fast tests (unit tests only)
[pytest:fast]
addopts = -m "not integration" -v

# Full tests (unit + integration)
[pytest:full]
addopts = -m "" -v
